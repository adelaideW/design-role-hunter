name: Sync Role Hunter jobs

on:
  schedule:
    - cron: "0 14 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Sync jobs
        run: npm run sync-jobs

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/jobs/ src/data/jobs.json src/data/jobs-meta.json
          if git diff --staged --quiet; then
            echo "No job data changes to commit."
            exit 0
          fi
          git commit -m "$(cat <<'EOF'
chore: sync Role Hunter job listings

Daily automated refresh from ATS boards and Built In SF.
EOF
)"
          git push
